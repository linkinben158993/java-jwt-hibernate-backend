spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jwt_db?createDatabaseIfNotExist=true&autoReconnect=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  security:
    oauth2:
      client:
        registration:
          okta:
            client-id: ${OKTA_CLIENT_ID}
            client-secret: ${OKTA_CLIENT_SECRET}
            client-authentication-method: basic
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email, address, phone
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            client-authentication-method: basic
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email, address, phone
        provider:
          okta:
            issuer-uri: https://dev-63754972.okta.com/oauth2/default
            authorization-uri: https://dev-63754972.okta.com/oauth2/default/v1/authorize
            user-info-uri: https://dev-63754972.okta.com/oauth2/default/v1/userinfo
            token-uri: https://dev-63754972.okta.com/oauth2/default/v1/token
            user-name-attribute: sub
            jwk-set-uri: https://dev-63754972.okta.com/oauth2/default/v1/keys
          google:
            issuer-uri: https://accounts.google.com
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            token-uri: https://www.googleapis.com/oauth2/v4/token
            user-name-attribute: sub
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs

okta:
  oauth2:
    issuer: https://dev-63754972.okta.com/oauth2/default
    clientId: ${OKTA_CLIENT_ID}
    clientSecret: ${OKTA_CLIENT_SECRET}

